<!DOCTYPE html>
<html lang="en">

<head>
  <!-- The head is invisible — it's info FOR the browser -->
  <meta charset="UTF-8">
  <title>Job Lie Detector</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- The body is everything the user SEES -->

  <div class="container">

    <!-- Header -->
    <h1>🔍 Job Lie Detector</h1>
    <p class="subtitle">
      Paste a job posting below and we'll flag the red flags.
    </p>

    <!-- Input area -->
    <textarea
      id="job-input"
      placeholder="Paste the job posting here..."
    ></textarea>

    <!-- Button -->
    <button id="analyze-btn">Analyze Job Posting</button>

    <!-- Results will appear here later -->
    <div id="results">
      <p>Results will appear here after analysis.</p>
    </div>

  </div>

</body>
</html>
